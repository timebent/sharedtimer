<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shared Timer</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="screenFlash" class="screen-flash" aria-hidden="true"></div>
    <div class="container">
      <h1 id="clock">00:00</h1>

      <div class="controls">
        <button id="start">Start</button>
        <button id="pause">Pause</button>
        <button id="rewind">Rewind</button>
        <input id="rewindSeconds" type="text" placeholder="MM:SS or seconds" />
      </div>

      <div class="cues">
        <div id="cueDisplay" class="cue-display">Cue 0</div>
        <div class="cue-select">
          <select id="cueSelect" aria-label="Jump to cue">
            <option value="">Jump to cue…</option>
          </select>
        </div>
      </div>

      <pre id="log" class="log"></pre>

      <script src="/socket.io/socket.io.js"></script>
      <script src="/clock.js"></script>
    </div>
  </body>
</html>
